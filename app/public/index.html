<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Task Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="p-4 bg-light">

  <div class="container">
    <h1 class="mb-4">Task Manager</h1>

    <button id="openFormBtn" class="btn btn-primary mb-3">Nueva tarea</button>

    <div id="formContainer" class="card p-3 mb-3 d-none">
      <form id="taskForm">
        <input type="text" id="taskTitle" class="form-control mb-2" placeholder="Título" required>
        <textarea id="taskDesc" class="form-control mb-2" placeholder="Descripción"></textarea>
        <button type="submit" class="btn btn-success">Guardar</button>
      </form>
    </div>

    <div class="card p-3 mb-3">
      <h2 class="h5 mb-3">Listado de tareas</h2>
      <ul id="taskList" class="list-group"></ul>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
